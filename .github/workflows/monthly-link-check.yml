name: Monthly link check

on:
  workflow_dispatch:
  schedule:
    # Run once a month on the first day at 05:17 UTC.
    - cron: "17 5 1 * *"

permissions:
  contents: read

jobs:
  check-links:
    name: Check docs links
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Check Markdown links
        run: python3 scripts/check_links.py --root . --timeout 15 --retries 2 --workers 24
